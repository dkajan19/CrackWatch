name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch: # Umožní ti spustiť sync manuálne tlačidlom v Actions

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://dkajan9:$HF_TOKEN@huggingface.co/spaces/dkajan9/crackwatch main
